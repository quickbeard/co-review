services:
  # =============================================================================
  # Database
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: co-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # PR-Agent Services
  # =============================================================================

  # PR-Agent API for Dashboard integration
  pr-agent-api:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
    container_name: co-review-pr-agent-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      KNOWLEDGE_BASE__ENABLED: "true"
      KNOWLEDGE_BASE__PROVIDER: "mem0"
      KNOWLEDGE_BASE__CHROMA_PATH: "/app/.mem0/chroma"
      KNOWLEDGE_BASE__CAPTURE_FROM_PR_COMMENTS: "true"
      KNOWLEDGE_BASE__APPLY_TO_REVIEW: "true"
      KNOWLEDGE_BASE__REQUIRE_AGENT_MENTION: "true"
      KNOWLEDGE_BASE__MAX_RETRIEVED_LEARNINGS: "5"
      # KNOWLEDGE_BASE__EMBEDDING_MODEL: "text-embedding-3-small"
      KNOWLEDGE_BASE__EMBEDDING_MODEL: "BAAI/bge-m3"
    volumes:
      - ./pr-agent/.pr_agent.toml:/app/.pr_agent.toml:ro
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro
      # Shared Mem0/Chroma store so the API, webhook handlers, and the
      # refinement worker all read/write the same learning index.
      - mem0_data:/app/.mem0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    entrypoint: ["python", "-m", "pr_agent.servers.api"]

  # GitHub webhook handler (optional - enable if using GitHub App)
  pr-agent-github:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
    container_name: co-review-pr-agent-github
    restart: unless-stopped
    profiles:
      - github
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      # Knowledge-base knobs must match pr-agent-api so the webhook handler
      # embeds with the same model/gateway and writes into the same Chroma
      # collection that the dashboard and worker read from.
      KNOWLEDGE_BASE__ENABLED: "true"
      KNOWLEDGE_BASE__PROVIDER: "mem0"
      KNOWLEDGE_BASE__CHROMA_PATH: "/app/.mem0/chroma"
      KNOWLEDGE_BASE__CAPTURE_FROM_PR_COMMENTS: "true"
      KNOWLEDGE_BASE__APPLY_TO_REVIEW: "true"
      KNOWLEDGE_BASE__REQUIRE_AGENT_MENTION: "true"
      KNOWLEDGE_BASE__MAX_RETRIEVED_LEARNINGS: "5"
      KNOWLEDGE_BASE__EMBEDDING_MODEL: "BAAI/bge-m3"
    volumes:
      - ./pr-agent/.pr_agent.toml:/app/.pr_agent.toml:ro
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro
      - mem0_data:/app/.mem0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["python", "-m", "pr_agent.servers.github_app"]

  # GitLab webhook handler (optional - enable if using GitLab)
  pr-agent-gitlab:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
    container_name: co-review-pr-agent-gitlab
    restart: unless-stopped
    profiles:
      - gitlab
    ports:
      - "3003:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      KNOWLEDGE_BASE__ENABLED: "true"
      KNOWLEDGE_BASE__PROVIDER: "mem0"
      KNOWLEDGE_BASE__CHROMA_PATH: "/app/.mem0/chroma"
      KNOWLEDGE_BASE__CAPTURE_FROM_PR_COMMENTS: "true"
      KNOWLEDGE_BASE__APPLY_TO_REVIEW: "true"
      KNOWLEDGE_BASE__REQUIRE_AGENT_MENTION: "true"
      KNOWLEDGE_BASE__MAX_RETRIEVED_LEARNINGS: "5"
      KNOWLEDGE_BASE__EMBEDDING_MODEL: "BAAI/bge-m3"
    volumes:
      - ./pr-agent/.pr_agent.toml:/app/.pr_agent.toml:ro
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro
      - mem0_data:/app/.mem0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["python", "-m", "pr_agent.servers.gitlab_webhook"]

  # Background worker that refines raw /learn captures via LLM.
  # Shares the mem0_data volume so refinements land in the same Chroma store
  # the API and webhook handlers read from.
  pr-agent-worker:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
    container_name: co-review-pr-agent-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      # Kept in sync with pr-agent-api so the worker reaches the same Chroma
      # location even if someone overrides KNOWLEDGE_BASE__CHROMA_PATH there.
      KNOWLEDGE_BASE__ENABLED: "true"
      KNOWLEDGE_BASE__PROVIDER: "mem0"
      KNOWLEDGE_BASE__CHROMA_PATH: "/app/.mem0/chroma"
      KNOWLEDGE_BASE__EMBEDDING_MODEL: "BAAI/bge-m3"
    volumes:
      - ./pr-agent/.pr_agent.toml:/app/.pr_agent.toml:ro
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro
      - mem0_data:/app/.mem0
    depends_on:
      postgres:
        condition: service_healthy
      pr-agent-api:
        condition: service_healthy
    entrypoint: ["python", "-m", "pr_agent.workers.refinement"]

  # =============================================================================
  # Dashboard
  # =============================================================================

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: co-review-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_PR_AGENT_API_URL: http://pr-agent-api:3001
      # Embed URL of the Apache DevLake Grafana dashboard.
      # Leave unset to hide the embed and show a setup hint instead.
      NEXT_PUBLIC_DEVLAKE_GRAFANA_URL: ${NEXT_PUBLIC_DEVLAKE_GRAFANA_URL:-}
    depends_on:
      pr-agent-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  # Named volume shared across every pr-agent service that reads or writes
  # Mem0/Chroma data. Without this each container had its own isolated
  # `.mem0/` directory and learnings never reached the webhook handlers.
  mem0_data:
