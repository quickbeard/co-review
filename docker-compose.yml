services:
  # =============================================================================
  # Database
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: co-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # PR-Agent Services
  # =============================================================================

  # GitHub webhook handler (optional - enable if using GitHub App)
  pr-agent-github:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
      target: github_app
    container_name: co-review-pr-agent-github
    restart: unless-stopped
    profiles:
      - github
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
    volumes:
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro

  # GitLab webhook handler (optional - enable if using GitLab)
  pr-agent-gitlab:
    build:
      context: ./pr-agent
      dockerfile: docker/Dockerfile
      target: gitlab_webhook
    container_name: co-review-pr-agent-gitlab
    restart: unless-stopped
    profiles:
      - gitlab
    ports:
      - "3003:3000"
    environment:
      PORT: "3000"
    volumes:
      - ./pr-agent/pr_agent/settings/.secrets.toml:/app/pr_agent/settings/.secrets.toml:ro

  # =============================================================================
  # Dashboard
  # =============================================================================

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: co-review-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./dashboard/.env
    environment:
      NODE_ENV: production
      # Override database URL to use docker network
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dashboard
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
