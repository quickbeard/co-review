name: PR-Agent CI

on:
  push:
    branches:
      - main
    paths:
      - "pr-agent/**"
      - ".github/workflows/pr-agent-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "pr-agent/**"
      - ".github/workflows/pr-agent-ci.yml"

defaults:
  run:
    working-directory: pr-agent

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pr-agent/requirements.txt
            pr-agent/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/unittest -v
