# Alembic configuration for PR-Agent.
#
# This file is used by the Alembic CLI during development (e.g. when generating
# new revisions with `alembic revision --autogenerate -m "..."`).
#
# At runtime, the API service drives Alembic programmatically via
# `pr_agent.db.migrations_runner.run_migrations`, which synthesizes its own
# Config object — so this file does not need to be shipped inside the image.
#
# The `sqlalchemy.url` below is only used when you run the Alembic CLI without
# a `DATABASE_URL` environment variable set. `env.py` prefers `DATABASE_URL`.

[alembic]
script_location = pr_agent/db/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/pr_agent

# Revision files are named "<revision>_<slug>.py". Keep slugs short and kebab
# or snake_case.
file_template = %%(rev)s_%%(slug)s

# Don't truncate slug to a couple words; keep meaningful names.
truncate_slug_length = 80

# =============================================================================
# Logging
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
