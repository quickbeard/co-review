[pr_reviewer]
enable_review_labels_effort = true
enable_auto_approval = true

[github_app]
pr_commands = [
    "/describe --pr_description.publish_description_as_comment=true",
    "/improve",
    "/agentic_review",
    "/review"
]

handle_push_trigger = true
push_commands = [
    "/improve",
    "/agentic_review"
]

[review_agent]
enabled = true
publish_output = true

[knowledge_base]
enabled = true
provider = "mem0"
chroma_path = "./.mem0/chroma"
capture_from_pr_comments = true
apply_to_review = true
embedding_model = "text"